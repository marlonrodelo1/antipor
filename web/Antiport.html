<style>
  :root {
    --primary: #3B6EA8;
    --primary-deep: #2C5485;
    --secondary: #7BA888;
    --accent: #E8B96A;
    --warm: #D97757;
    --warm-soft: #EFC9B6;
    --warm-bg: #F5E5DC;
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --ink: #1C2128;
    --ink-2: #3F4854;
    --ink-3: #6B7280;
    --hairline: rgba(28,33,40,0.08);
    --hairline-strong: rgba(28,33,40,0.14);

    /* dark */
    --dk-bg: #0F1419;
    --dk-surface: #1C2128;
    --dk-surface-2: #242A33;
    --dk-ink: #E8E6E3;
    --dk-ink-2: #A6ADB7;
    --dk-hairline: rgba(255,255,255,0.08);

    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
  }
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: var(--sans); color: var(--ink); }
  /* lightweight reset for inside-frame layouts */
  .ap * { box-sizing: border-box; }
  .ap { font-family: var(--sans); color: var(--ink); -webkit-font-smoothing: antialiased; }
  .ap-serif { font-family: var(--serif); font-optical-sizing: auto; letter-spacing: -0.01em; }
  .ap-h1 { font-family: var(--serif); font-weight: 500; letter-spacing: -0.02em; }
